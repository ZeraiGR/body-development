name: deploy

# Деплой на VPS при пуше в main.
# Требует секрет VPS_SSH_KEY (приватный deploy-ключ, чей публичный лежит
# в /root/.ssh/authorized_keys на VPS). См. docs/DEPLOY.md.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 194.62.66.34
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /root/body-development
            git fetch --all --prune
            git reset --hard origin/main
            .venv/bin/pip install -q -r requirements.txt
            systemctl restart back-bot
            echo "deployed: $(date -u +%FT%TZ)"
